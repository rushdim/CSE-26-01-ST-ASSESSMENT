<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FCA Refugee Support Program - Registration</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ─── Landing / Home ─────────────────────────────────────── -->
    <div class="landing" id="landing">

        <div class="logo-circle">
            <!-- Fixed: Removed double circle div -->
            <img src="image.png" alt="FCA Logo" class="fca-img">
        </div>

        <div>
            <h1 class="logo-text">Refugee Support Program</h1>
            <p class="subtitle">FCA Refugee Support Program</p>
        </div>

        <button class="btn-register" onclick="showForm()">Register</button>

    </div>

    <!-- ─── Registration Form ──────────────────────────────────── -->
    <div class="form-container" id="formPage">

        <div class="form-flex"> <!-- Added class for better CSS control -->

            <div class="form-left">
                <div class="logo-circle">
                    <!-- Fixed: Removed double circle div -->
                    <img src="image.png" alt="FCA Logo" class="fca-img">
                </div>
                <h2 style="color:white; margin-top:1rem;">Refugee Support Program</h2>
            </div>

            <div class="form-content">

                <h2>BENEFICIARY REGISTRATION FORM</h2>

                <form class="form-grid" novalidate>

                    <div class="form-group">
                        <label>First Name <span style="color:red;">*</span></label>
                        <input type="text" id="firstName" required placeholder="Enter your First name">
                    </div>

                    <div class="form-group">
                        <label>Last Name <span style="color:red;">*</span></label>
                        <input type="text" id="lastName" required placeholder="Enter your Last name">
                    </div>

                    <div class="form-group">
                        <label>Date of birth <span style="color:red;">*</span></label>
                        <input type="date" id="dob" required>
                    </div>

                    <div class="form-group">
                        <label>Place of Birth <span style="color:red;">*</span></label>
                        <input type="text" id="placeOfBirth" required placeholder="Enter your place of birth">
                    </div>

                    <div class="form-group full-width">
                        <label>Gender</label>
                        <div class="radio-group">
                            <label><input type="radio" name="gender" value="male"> Male</label>
                            <label><input type="radio" name="gender" value="female" checked> Female</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Nationality <span style="color:red;">*</span></label>
                        <select id="nationality" required>
                            <option value="">-- Select Nationality --</option>
                            <option>Ugandan</option>
                            <option>Kenyan</option>
                            <option>Tanzanian</option>
                            <option>Burundian</option>
                            <option>Rwandese</option>
                            <option>Somali</option>
                            <option>South Sudanese</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Marital status <span style="color:red;">*</span></label>
                        <select id="maritalStatus" required>
                            <option value="">-- Select Marital status --</option>
                            <option>Single</option>
                            <option>Married</option>
                            <option>Divorced</option>
                            <option>Widowed</option>
                            <option>Separated</option> <!-- Rule: Added Separated -->
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Settlement camp <span style="color:red;">*</span></label>
                        <select id="settlementCamp" required>
                            <option value="">-- Select settlement camp --</option>
                            <option>Gulu settlement camp</option>
                            <option>Arua settlement camp</option>
                            <option>Mbarara settlement camp</option>
                            <option>Kasese settlement camp</option>
                            <option>Busia settlement camp</option>
                            <option>Mbale settlement camp</option>
                            <option>Kigezi settlement camp</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Date of joining Settlement camp <span style="color:red;">*</span></label>
                        <input type="date" id="dateJoined" required>
                    </div>

                    <button type="submit" class="btn-submit">Register</button>

                </form>

            </div>

        </div>

    </div>

    <script src="index.js"> </script>

</body>

</html>
